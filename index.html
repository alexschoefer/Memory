<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
    <script type="module" src="./src/main.ts"></script>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <main>
        <!-- Start page -->
        <section id="start-page" class="start page page--active">
            <div>
                <h1>It´s play time.</h1>
                <p>Ready to play?</p>
                <button id="play-btn"><span></span>Play<span></span></button>
            </div>
            <div class="start__img"></div>
        </section>
        <!-- Game setting page -->
        <section id="settings-page" class="settings page">
            <div class="settings__content">
                <!-- Left setting container -->
                <div class="settings__left-side-container">
                    <div class="settings__header">
                        <h2>Settings</h2>
                        <img src="./public/assets/img/settings/line_underline_left.png" alt="line_underline_left">
                    </div>

                    <div class="settings__game-mode">
                        <div class="settings__game-mode-header">
                            <img src="./public/assets/img/settings/palette.png" alt="">
                            <h3>Game themes</h3>
                        </div>
                        <ul>
                            <li>
                                <label>
                                    <input type="radio" name="theme" data-theme="coding">
                                    <span class="radio"></span>
                                    Coding vibes theme
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio" name="theme" data-theme="gaming">
                                    <span class="radio"></span>
                                    Gaming theme
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio" name="theme" data-theme="projects">
                                    <span class="radio"></span>
                                    DA Projects theme
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio" name="theme" data-theme="food">
                                    <span class="radio"></span>
                                    Foods theme
                                </label>
                            </li>
                        </ul>
                    </div>

                    <div class="settings__game-mode">
                        <div class="settings__game-mode-header">
                            <img src="./public/assets/img/settings/player_choice.png" alt="">
                            <h3>Choose player</h3>
                        </div>
                        <ul>
                            <li>
                                <label>
                                    <input type="radio" name="player" value="blue">
                                    <span class="radio"></span>
                                    Blue
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio" name="player" value="orange">
                                    <span class="radio"></span>
                                    Orange
                                </label>
                            </li>
                        </ul>
                    </div>

                    <div class="settings__game-mode">
                        <div class="settings__game-mode-header">
                            <img src="./public/assets/img/settings/board_size.png" alt="">
                            <h3>Board size</h3>
                        </div>
                        <ul>
                            <li>
                                <label>
                                    <input type="radio" name="board-size" value="16">
                                    <span class="radio"></span>
                                    16 cards
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio" name="board-size" value="24">
                                    <span class="radio"></span>
                                    24 cards
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio" name="board-size" value="36">
                                    <span class="radio"></span>
                                    36 cards
                                </label>
                            </li>
                        </ul>
                    </div>
                </div>
                <!-- Right setting container -->
                <div class="settings__right-side-container">
                    <div id="theme_visual" class="settings__theme-visual"></div>
                    <div class="settings__theme_visual-selection_infoboard">
                        <p>Game theme</p>
                        <span></span>
                        <p>Player</p>
                        <span></span>
                        <p>Board size</p>
                        <button id="start-game-btn">
                            <span></span>Start
                        </button>
                    </div>
                </div>
            </div>
        </section>
        <!-- Game page -->
        <section id="game-page" class="game page">
            <header class="game-header">
                <nav class="game-header__nav">
                    <div class="game-header__nav-scoreboard-container">
                        <div class="game-header__nav-players">
                            <img src="./public/assets/img/game/playerLabel_blue.png" alt="playerLabel_blue">
                            <p class="game-header__playerBlue">Blue</p>
                            <p class="game-header__playerBlue">0</p>
                        </div>
                        <div class="game-header__nav-players">
                            <img src="./public/assets/img/game/playerLabel_orange.png" alt="playerLabel_orange">
                            <p class="game-header__playerOrange">Orange</p>
                            <p class="game-header__playerOrange">0</p>
                        </div>
                    </div>
                    <div class="game-header__current-player">
                        <p>Current player:</p>
                        <img src="./public/assets/img/game/playerLabel_blue.png" alt="">
                    </div>
                    <button id="exit-game-btn" class="game-header__exit">
                        <span></span>
                        Exit game
                    </button>
                </nav>
            </header>
            <div class="game-cards"></div>
            <template id="card-template">
                <button class="card">
                    <div class="card__inner">
                        <div class="card__face card__face--front"></div>
                        <div class="card__face card__face--back"></div>
                    </div>
                </button>
            </template>
        </section>
    </main>
</body>

</html>
